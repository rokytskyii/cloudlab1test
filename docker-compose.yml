version: '3.4'

services:
  smartphonestore.api:
    image: smartphonestore-api
    build:
      context: .
      dockerfile: SmartphoneStore.Api/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001" 
      - "10002:10002" 
    volumes:
      - azurite_data:/data
    command: "azurite --loose --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data"


volumes:
  azurite_data:
  